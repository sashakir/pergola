const buildTaskMarkdown = "# Задание на изготовление деревянной перголы\n\nФинальный вариант: отдельно стоящая деревянная пергола на существующей бетонной плите 2500 x 6500 мм с террасной доской, 6 клееных стоек 140x140, прозрачной кровлей из поликарбоната, двумя приватными стенками из горизонтальных реек и укосинами по углам.\n\nФайлы модели в этой папке:\n\n- `pergola_final_6posts_6m.html` - интерактивный HTML-просмотр.\n- `pergola_final_model.glb` - модель для Blender.\n- `pergola_final_model.obj` + `pergola_final_model.mtl` - OBJ-модель.\n- `pergola_final_model.dae` - Collada-модель.\n- `generate_final_model.js` - генератор модели.\n\n## Основные размеры\n\n- Плита/площадка: 6500 x 2500 мм.\n- Длинные несущие балки: 6000 мм.\n- Координаты стоек по длине: -3180, -588, 2004 мм.\n- Свес длинных балок за крайними стойками: 408 мм с каждой стороны.\n- Координаты стоек по ширине: -1180 и 1180 мм.\n- Стойки: клееный брус 140x140 мм.\n- Стропила: 45x145 мм, 10 шт.\n- Стропильная заготовка из доски 6000 мм:\n  - нижняя кромка: 2782.5 мм;\n  - верхняя кромка: 3072.5 мм;\n  - скос с каждой стороны: 145 мм;\n  - из одной доски 6000 мм получается 2 стропилины.\n- Длинная приватная стенка: 14 реек 20x95 длиной 5184 мм.\n- Короткая приватная стенка: 14 реек 20x95 длиной 2220 мм.\n- Зазор между рейками приватных стенок: около 70 мм.\n- Укосины: 8 шт., трапециевидные, ориентир заготовки 45x190, катет около 760 мм.\n\n## Пиломатериал и стоимость\n\nЦены приняты по текущему расчету:\n\n- 45x145x6000 - 1409 руб./шт.\n- 20x95x6000 - 443 руб./шт.\n- 45x190x6000 - 1890 руб./шт.\n- 140x140x6000 - 8000 руб./шт.\n\n| Материал | Кол-во | Цена за шт. | Сумма |\n|---|---:|---:|---:|\n| Клееный брус 140x140x6000 | 3 шт. | 8000 руб. | 24000 руб. |\n| Доска 45x145x6000 | 7 шт. | 1409 руб. | 9863 руб. |\n| Доска 20x95x6000 | 21 шт. | 443 руб. | 9303 руб. |\n| Доска 45x190x6000 для укосин | 2 шт. | 1890 руб. | 3780 руб. |\n\nИтого за дерево: 46946 руб.\n\nРекомендуемый запас 10%: около 51600 руб.\n\n## Раскрой\n\n### Брус 140x140x6000\n\nНужно 6 стоек:\n\n- 3 стойки по высокой стороне: около 2594 мм;\n- 3 стойки по низкой стороне: около 2406 мм.\n\nИз одного бруса 6000 мм получается одна высокая и одна низкая стойка. Нужно 3 бруса.\n\n### Доска 45x145x6000\n\nНужно 7 досок:\n\n- 2 доски на две длинные несущие балки по 6000 мм;\n- 5 досок на 10 стропил, по 2 стропилины из одной доски.\n\n### Доска 20x95x6000\n\nНужно 21 доска:\n\n- 14 досок на длинную приватную стенку: 14 реек по 5184 мм;\n- 7 досок на короткую приватную стенку: 14 реек по 2220 мм, по 2 рейки из одной доски.\n\n### Доска 45x190x6000\n\nНужно 2 доски на 8 укосин. Резать по месту по шаблону, после примерки верхнего узла стойка-балка.\n\n## Крепеж и металлические элементы\n\nМинимальный набор:\n\n| Узел | Рекомендуемый крепеж | Кол-во |\n|---|---|---:|\n| Стойки к бетону | регулируемые/оцинкованные опоры столба 140x140 | 6 шт. |\n| Опоры столба к бетону | анкера М12 или М16 | по паспорту опоры, обычно 2-4 анкера на опору |\n| Стропила к длинным балкам | стропильные уголки/крепления с двух сторон | 40 шт. |\n| Длинные балки к стойкам | усиленные уголки или пластины, плюс болты/конструкционные саморезы | 12 шт. |\n| Укосины | конструкционные саморезы/глухари, можно добавить пластины | 16 узлов крепления |\n| Рейки приватных стенок | нержавеющие/оцинкованные саморезы по дереву | примерно 200 шт. с запасом |\n| Поликарбонат | термошайбы, соединительные/торцевые профили, лента | по выбранной схеме листов |\n\nПрактичный запас:\n\n- стропильные уголки: 44 шт.;\n- усиленные уголки/пластины для балка-стойка: 14-16 шт.;\n- пластины на укосины, если нужны: 16-20 шт.;\n- опоры столба 140x140: 6 шт.;\n- анкера: по паспорту опоры + 10%;\n- конструкционные саморезы: отдельно под выбранные уголки, обычно 5x40/5x50 для уголков и 6-8 мм для силовых соединений;\n- саморезы для реек: 200-250 шт.\n\n## Узлы и запилы\n\n### Стойка - бетон\n\nСтойки не ставить прямо на террасную доску и не опирать торцом в воду. В местах стоек вырезать террасную доску, поставить металлическую опору на бетонную плиту и закрепить анкерами. Дерево должно быть приподнято над поверхностью, чтобы низ стойки проветривался.\n\n### Стойка - длинная несущая балка\n\nРекомендуемый DIY-узел:\n\n- в стойке сделать выборку под доску 45x145;\n- глубина выборки: 45 мм;\n- высота выборки: 145 мм;\n- балка садится в выборку и опирается на деревянную полку;\n- дополнительно стянуть узел болтами М10/М12 с широкими шайбами или конструкционными саморезами;\n- с внутренней стороны можно добавить усиленный уголок или пластину.\n\nНе крепить несущую балку только обычными черными саморезами без опирания.\n\n### Стропила - длинные балки\n\nСтропила не ставить прямо на ось вертикальных стоек. В модели предпоследние стропила смещены к внутренним граням крайних стоек, чтобы не делать сложный двойной запил в стойке.\n\nВариант крепления:\n\n- стропило лежит сверху на длинных балках;\n- сделать мелкий посадочный запил в стропиле, если нужно зафиксировать положение;\n- глубина посадочного запила: не более 25-30 мм;\n- не ослаблять стропило глубже 1/4 высоты;\n- фиксировать стропило стропильными уголками/креплениями с двух сторон или конструкционными саморезами под углом;\n- обязательно предусмотреть крепление от ветрового подъема кровли.\n\n### Укосины\n\nУкосины нужны для боковой жесткости и защиты рамы от раскачки. Они не столько держат вес крыши, сколько не дают конструкции складываться ромбом.\n\nРекомендации:\n\n- оставить 8 укосин: по две на каждый угол;\n- торцы укосин делать плоскими, с плотным примыканием к стойке и балке;\n- крепить не в торец обычными саморезами, а конструкционными саморезами/глухарями;\n- минимум по 2 силовых крепежа на каждый конец укосины;\n- при необходимости добавить скрытые пластины с внутренней стороны.\n\n### Приватные стенки\n\nРейки 20x95 крепить горизонтально с зазором около 70 мм.\n\nДлинная стенка:\n\n- рейки длиной 5184 мм;\n- начинаются и заканчиваются по крайним стойкам;\n- крепить к левой, средней и правой стойке;\n- по 2 самореза в каждую точку крепления.\n\nКороткая стенка:\n\n- рейки длиной 2220 мм;\n- крепить между передней и задней стойками короткой стороны;\n- по 2 самореза в каждую точку крепления.\n\n## Порядок сборки\n\n1. Разметить положение стоек на плите:\n   - по длине: -3180, -588, 2004 мм;\n   - по ширине: -1180 и 1180 мм.\n2. Вырезать террасную доску в местах опор столбов.\n3. Разметить и просверлить бетон под анкера опор.\n4. Установить металлические опоры столбов, проверить диагонали и прямоугольность.\n5. Нарезать стойки 140x140 по фактической высоте, с учетом уклона крыши.\n6. Сделать выборки в стойках под длинные балки 45x145.\n7. Установить стойки, временно раскрепить их укосами/подпорками.\n8. Установить две длинные несущие балки 45x145x6000 в выборки стоек.\n9. Проверить вертикальность стоек, горизонт/уклон, диагонали и параллельность балок.\n10. Установить укосины по углам.\n11. Разметить стропила по координатам модели:\n    - -3588;\n    - -3087.5;\n    - -2373.4;\n    - -1659.2;\n    - -945.1;\n    - -230.9;\n    - 483.2;\n    - 1197.4;\n    - 1911.5;\n    - 2412 мм.\n12. Нарезать и установить 10 стропил 45x145.\n13. Установить горизонтальные рейки длинной приватной стенки.\n14. Установить горизонтальные рейки короткой приватной стенки.\n15. Обработать торцы, запилы и места крепления защитным составом.\n16. Смонтировать прозрачный поликарбонат с термошайбами и профилями.\n17. Финально подтянуть крепеж, проверить отсутствие раскачки.\n\n## Важные замечания\n\n- Это проект для самостоятельной сборки, не инженерный расчет.\n- Для Ленинградской области нужно учитывать снеговую и ветровую нагрузку, особенно из-за поликарбоната.\n- Опоры столбов и анкера выбирать не декоративные, а силовые, рассчитанные на наружные конструкции.\n- Все резы и торцы обязательно пропитать до сборки.\n- Желательно делать пробный шаблон укосины и стропильного запила на обрезке, затем переносить на все детали.\n";

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.3, 0);
controls.enableRotate = false;
controls.mouseButtons.LEFT = THREE.MOUSE.PAN;
controls.mouseButtons.MIDDLE = THREE.MOUSE.DOLLY;
controls.mouseButtons.RIGHT = THREE.MOUSE.PAN;
controls.update();
renderer.domElement.style.touchAction = "none";

function moveCamera(deltaTheta, deltaPhi, zoomFactor = 1) {
  const target = controls.target;
  const offset = camera.position.clone().sub(target);
  const spherical = new THREE.Spherical().setFromVector3(offset);
  spherical.theta += deltaTheta;
  spherical.phi += deltaPhi;
  spherical.radius *= zoomFactor;
  spherical.phi = Math.max(0.18, Math.min(Math.PI - 0.18, spherical.phi));
  spherical.radius = Math.max(1.8, Math.min(18, spherical.radius));
  camera.position.copy(target).add(new THREE.Vector3().setFromSpherical(spherical));
  camera.lookAt(target);
  controls.update();
}

renderer.domElement.addEventListener("wheel", (event) => {
  event.preventDefault();
  if (event.ctrlKey) {
    moveCamera(0, 0, Math.exp(event.deltaY * 0.0015));
  } else {
    moveCamera(event.deltaX * 0.006, event.deltaY * 0.006);
  }
}, { passive: false });

let lastTouchAngle = null;
let lastTouchDistance = null;

function touchMetrics(event) {
  const a = event.touches[0];
  const b = event.touches[1];
  const dx = b.clientX - a.clientX;
  const dy = b.clientY - a.clientY;
  return {
    angle: Math.atan2(dy, dx),
    distance: Math.hypot(dx, dy),
  };
}

renderer.domElement.addEventListener("touchstart", (event) => {
  if (event.touches.length === 2) {
    event.preventDefault();
    const metrics = touchMetrics(event);
    lastTouchAngle = metrics.angle;
    lastTouchDistance = metrics.distance;
  }
}, { passive: false });

renderer.domElement.addEventListener("touchmove", (event) => {
  if (event.touches.length === 2 && lastTouchAngle !== null && lastTouchDistance !== null) {
    event.preventDefault();
    const metrics = touchMetrics(event);
    const deltaAngle = metrics.angle - lastTouchAngle;
    const zoomFactor = lastTouchDistance / Math.max(20, metrics.distance);
    moveCamera(deltaAngle, 0, zoomFactor);
    lastTouchAngle = metrics.angle;
    lastTouchDistance = metrics.distance;
  }
}, { passive: false });

renderer.domElement.addEventListener("touchend", (event) => {
  if (event.touches.length < 2) {
    lastTouchAngle = null;
    lastTouchDistance = null;
  }
}, { passive: false });

function box(name, x, y, z, sx, sy, sz, mat, rotX = 0) {
  const g = new THREE.BoxGeometry(sx / 1000, sy / 1000, sz / 1000);
  const m = new THREE.Mesh(g, mat);

function yAtZ(z) { return 2500 - 0.08 * z; }

function clipPolygon2(poly, inside, intersect) {
  const out = [];
  for (let i = 0; i < poly.length; i++) {
    const a = poly[i];
    const b = poly[(i + 1) % poly.length];
    const aIn = inside(a);
    const bIn = inside(b);
    if (aIn && bIn) out.push(b);
    else if (aIn && !bIn) out.push(intersect(a, b));
    else if (!aIn && bIn) out.push(intersect(a, b), b);
  }
  return out;
}

function kneeBraceProfile2(leg, width) {
  return [
    [0, -leg],
    [0, -leg + width],
    [leg - width, 0],
    [leg, 0],
  ];
}

function cleanPolygon2(poly) {
  const cleaned = [];
  for (const p of poly) {
    const last = cleaned[cleaned.length - 1];
    if (!last || Math.hypot(p[0] - last[0], p[1] - last[1]) > 0.001) cleaned.push(p);
  }
  if (cleaned.length > 1) {
    const first = cleaned[0];
    const last = cleaned[cleaned.length - 1];
    if (Math.hypot(first[0] - last[0], first[1] - last[1]) <= 0.001) cleaned.pop();
  }
  return cleaned;
}

function kneeBrace(name, cornerX, cornerZ, inwardX, inwardZ, plane, mat) {
  const leg = 760;
  const width = 190;
  const thickness = 45;
  const beamBottomY = yAtZ(cornerZ) - 145 + (cornerZ > 0 ? 200 : 0);
  const profile = kneeBraceProfile2(leg, width);
  const verts = [];
  for (const side of [-thickness / 2, thickness / 2]) {
    for (const [h, v] of profile) {
      if (plane === "long") {
        verts.push(new THREE.Vector3((cornerX + inwardX * (70 + h)) / 1000, (beamBottomY + v) / 1000, (cornerZ + side) / 1000));
      } else {
        verts.push(new THREE.Vector3((cornerX + side) / 1000, (beamBottomY + v) / 1000, (cornerZ + inwardZ * (70 + h)) / 1000));
      }
    }
  }
  const n = profile.length;
  const positions = new Float32Array(verts.flatMap((p) => [p.x, p.y, p.z]));
  const indices = [];
  for (let i = 1; i < n - 1; i++) indices.push(0, i, i + 1);
  for (let i = 1; i < n - 1; i++) indices.push(n, n + i + 1, n + i);
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    indices.push(i, j, n + j, i, n + j, n + i);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  g.setIndex(indices);
  g.computeVertexNormals();
  const m = new THREE.Mesh(g, mat);
  m.name = name;
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

function rafter(name, x, y, z, length, bottomLength, height, width, mat) {
  const angle = Math.atan2(200, length);
  const along = new THREE.Vector3(0, -Math.sin(angle), Math.cos(angle)).normalize();
  const up = new THREE.Vector3(0, Math.cos(angle), Math.sin(angle)).normalize();
  const right = new THREE.Vector3(1, 0, 0);
  const center = new THREE.Vector3(x / 1000, y / 1000, z / 1000);
  const halfW = width / 2000;
  const halfH = height / 2000;
  const halfL = length / 2000;
  const cut = (length - bottomLength) / 2000;
  const profile = [
    [-halfL + cut, -halfH],
    [halfL - cut, -halfH],
    [halfL, halfH],
    [-halfL, halfH],
  ];
  const verts = [];
  for (const sx of [-halfW, halfW]) {
    for (const [lz, ly] of profile) {
      verts.push(center.clone().add(right.clone().multiplyScalar(sx)).add(along.clone().multiplyScalar(lz)).add(up.clone().multiplyScalar(ly)));
    }
  }
  const positions = new Float32Array(verts.flatMap((p) => [p.x, p.y, p.z]));
  const indices = [
    0, 1, 2, 0, 2, 3,
    4, 7, 6, 4, 6, 5,
    0, 4, 5, 0, 5, 1,
    1, 5, 6, 1, 6, 2,
    2, 6, 7, 2, 7, 3,
    3, 7, 4, 3, 4, 0,
  ];
  const g = new THREE.BufferGeometry();

  const m = new THREE.Mesh(g, mat);

function longCutBeam(name, x, y, z, length, height, width, mat) {
  const center = new THREE.Vector3(x / 1000, y / 1000, z / 1000);
  const halfL = length / 2000;
  const halfH = height / 2000;
  const halfW = width / 2000;
  const cut = height / 1000;
  const profile = [
    [-halfL + cut, -halfH],
    [halfL - cut, -halfH],
    [halfL, halfH],
    [-halfL, halfH],
  ];
  const verts = [];
  for (const sz of [-halfW, halfW]) {
    for (const [lx, ly] of profile) {
      verts.push(center.clone().add(new THREE.Vector3(lx, ly, sz)));
    }
  }
  const positions = new Float32Array(verts.flatMap((p) => [p.x, p.y, p.z]));
  const indices = [
    0, 1, 2, 0, 2, 3,
    4, 7, 6, 4, 6, 5,
    0, 4, 5, 0, 5, 1,
    1, 5, 6, 1, 6, 2,
    2, 6, 7, 2, 7, 3,
    3, 7, 4, 3, 4, 0,
  ];
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  g.setIndex(indices);
  g.computeVertexNormals();
  const m = new THREE.Mesh(g, mat);
  m.name = name;
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  return m;
}
